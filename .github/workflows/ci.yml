name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

  validate-action:
    name: Validate Action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate action.yml
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const yaml = require('yaml');
            const content = fs.readFileSync('actions/idevops/action.yml', 'utf8');
            try {
              yaml.parse(content);
              core.info('action.yml is valid YAML');
            } catch (e) {
              core.setFailed(`action.yml is invalid: ${e.message}`);
            }

      - name: Check shell scripts syntax
        run: |
          for script in actions/idevops/scripts/*.sh; do
            echo "Checking: $script"
            bash -n "$script" || exit 1
          done
          echo "All scripts have valid syntax"

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run audit
        run: echo "Shell scripts only, no npm audit needed"

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, validate-action, security]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Validate Action: ${{ needs.validate-action.result }}"
          echo "Security: ${{ needs.security.result }}"

          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.validate-action.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi

          echo "All required jobs passed!"
