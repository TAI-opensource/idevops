name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Full iDevOps pipeline
  # ─────────────────────────────────────────────
  idevops:
    name: iDevOps Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run iDevOps
        uses: TAI-opensource/idevops/actions/idevops@main
        with:
          # Language detection: "auto" detects from repo, or comma-separated list
          languages: "auto"
          # Security scanning
          security: "true" # Run security scans (Trivy, OSV-Scanner)
          sast: "true" # Run Semgrep SAST scans
          sca: "true" # Run Software Composition Analysis
          scan-secrets: "true" # Scan for leaked secrets (Gitleaks, TruffleHog)
          # Code quality
          lint: "true" # Run language-specific linters
          quality: "true" # Run code quality metrics
          # Dependencies
          dependencies: "true" # Audit dependencies for vulnerabilities
          check-outdated: "true" # Check for outdated packages
          # Fail threshold: critical, high, medium, low, never
          fail-on: "medium"
          # SARIF upload to GitHub Security tab
          upload-sarif: "true"
          # Semgrep App token for custom rules (passed as input, not env)
          semgrep-app-token: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ─────────────────────────────────────────────
  # Job 2: Validate action YAML and scripts
  # ─────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate action.yml
        shell: bash
        run: |
          sudo curl -fsSL "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64" -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

          for action_file in actions/*/action.yml; do
            echo "Validating: $action_file"
            yq eval '.' "$action_file" > /dev/null 2>&1 || {
              echo "ERROR: Invalid YAML in $action_file"
              yq eval '.' "$action_file"
              exit 1
            }
            echo "OK: $action_file"
          done

      - name: Validate scripts syntax
        run: |
          for script in actions/idevops/scripts/*.sh; do
            echo "Checking: $script"
            bash -n "$script" || exit 1
          done
          echo "All scripts valid"

  # ─────────────────────────────────────────────
  # Job 3: Report overall workflow status
  # ─────────────────────────────────────────────
  status:
    name: Status
    if: always()
    needs: [idevops, validate]
    runs-on: ubuntu-latest
    steps:
      - name: Report status
        shell: bash
        run: |
          echo "## CI Workflow Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| iDevOps Pipeline | ${{ needs.idevops.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.idevops.result }}" != "success" ] || [ "${{ needs.validate.result }}" != "success" ]; then
            echo "One or more jobs failed."
            exit 1
          fi

          echo "All jobs passed."
