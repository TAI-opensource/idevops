name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

jobs:
  idevops:
    name: iDevOps Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run iDevOps
        uses: TAI-opensource/idevops/actions/idevops@main
        with:
          languages: "auto"
          security: "true"
          sast: "true"
          sca: "true"
          secrets: "true"
          lint: "true"
          quality: "true"
          dependencies: "true"
          check-outdated: "true"
          fail-on: "medium"
          upload-sarif: "true"
          semgrep-app-token: ${{ secrets.SEMGREP_APP_TOKEN }}

  validate:
    name: Validate Action
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate action.yml
        shell: bash
        run: |
          sudo curl -fsSL "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64" -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

          for action_file in actions/*/action.yml; do
            echo "Validating: $action_file"
            yq eval '.' "$action_file" > /dev/null 2>&1 || {
              echo "ERROR: Invalid YAML in $action_file"
              yq eval '.' "$action_file"
              exit 1
            }
            echo "OK: $action_file"
          done

      - name: Validate scripts syntax
        run: |
          for script in actions/idevops/scripts/*.sh; do
            echo "Checking: $script"
            bash -n "$script" || exit 1
          done
          echo "All scripts valid"
