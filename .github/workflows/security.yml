name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript"]
    steps:
      - name: Checkout
        uses: ./actions/checkout
        with:
          token: ${{ github.token }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality
        continue-on-error: true

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
        continue-on-error: true

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: ./actions/checkout
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always

  vulnerability-check:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: ./actions/checkout
        with:
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: ./actions/setup-node
        with:
          node-version: 26
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=moderate

      - name: Check for outdated dependencies
        run: npm outdated || true

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: ./actions/checkout
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: Scan for secrets (TruffleHog)
        shell: bash
        run: |
          echo "[Secret Scanning] Running TruffleHog..."
          docker run --rm \
            -v "$(pwd):/repo" \
            -w /repo \
            trufflesecurity/trufflehog:latest \
            git file:///repo --only-verified --json > trufflehog-results.json 2>&1 || true

          # Count results
          FINDINGS=$(jq '.results | length' trufflehog-results.json 2>/dev/null || echo "0")
          echo "[Secret Scanning] Found $FINDINGS verified secrets"
          cat trufflehog-results.json | jq '.results[].DetectorName' 2>/dev/null || echo "No findings"

          if [ "$FINDINGS" -gt 0 ]; then
            echo "[Secret Scanning] WARNING: Verified secrets found!"
            cat trufflehog-results.json | jq '.' 2>/dev/null
          fi

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: ./actions/checkout
        with:
          token: ${{ github.token }}
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
