name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Mondays at 06:00 UTC
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Security-focused iDevOps scan
  # ─────────────────────────────────────────────
  idevops-security:
    name: iDevOps Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "iDevOps: Setup"
        shell: bash
        run: |
          chmod +x actions/idevops/scripts/*.sh 2>/dev/null || true
          mkdir -p .idevops/reports .idevops/cache
          echo "## iDevOps Security Scan" >> $GITHUB_STEP_SUMMARY
        env:
          IDEVOPS_LANGUAGES: "auto"
          IDEVOPS_SECURITY: "true"
          IDEVOPS_SAST: "true"
          IDEVOPS_SCA: "true"
          IDEVOPS_SECRETS: "true"
          IDEVOPS_LINT: "false"
          IDEVOPS_LINT_FIX: "false"
          IDEVOPS_QUALITY: "false"
          IDEVOPS_DEPS: "true"
          IDEVOPS_OUTDATED: "true"
          IDEVOPS_LICENSES: "false"
          IDEVOPS_DAST: "false"
          IDEVOPS_RECON: "false"
          IDEVOPS_SBOM: "false"
          IDEVOPS_SBOM_FORMAT: "both"
          IDEVOPS_FAIL_ON: "high"
          IDEVOPS_UPLOAD_SARIF: "true"
          IDEVOPS_REPORT_DIR: ".idevops/reports"
          IDEVOPS_CONTAINER_IMAGE: ""
          IDEVOPS_TARGET_URL: ""

      - name: "iDevOps: Security Scan (Universal)"
        shell: bash
        run: ./actions/idevops/scripts/security-universal.sh
        continue-on-error: true

      - name: "iDevOps: Security Scan (Trivy)"
        shell: bash
        run: ./actions/idevops/scripts/security-trivy.sh
        continue-on-error: true

      - name: "iDevOps: SAST (OSV-Scanner)"
        shell: bash
        run: ./actions/idevops/scripts/security-osv.sh
        continue-on-error: true

      - name: "iDevOps: SAST (Semgrep)"
        shell: bash
        run: ./actions/idevops/scripts/security-semgrep.sh
        continue-on-error: true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: "iDevOps: Secret Detection (Gitleaks)"
        shell: bash
        run: ./actions/idevops/scripts/secrets-gitleaks.sh
        continue-on-error: true

      - name: "iDevOps: Secret Detection (TruffleHog)"
        shell: bash
        run: ./actions/idevops/scripts/secrets-trufflehog.sh
        continue-on-error: true

      - name: "iDevOps: Dependencies Audit"
        shell: bash
        run: ./actions/idevops/scripts/deps-universal.sh
        continue-on-error: true

      - name: "iDevOps: Dependencies Outdated"
        shell: bash
        run: ./actions/idevops/scripts/outdated-checker.sh
        continue-on-error: true

      - name: "iDevOps: Generate Report"
        if: always()
        shell: bash
        run: ./actions/idevops/scripts/summary.sh

      - name: "iDevOps: Upload SARIF"
        if: always()
        shell: bash
        run: ./actions/idevops/scripts/sarif-upload.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # ─────────────────────────────────────────────
  # Job 2: OpenSSF Scorecard analysis
  # ─────────────────────────────────────────────
  scorecard:
    name: Scorecard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        shell: bash
        run: |
          if [ -f results.sarif ]; then
            curl -s -X POST \
              -H "Authorization: token ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              -d "{\"sarif\": $(cat results.sarif), \"commit_sha\": \"${{ github.sha }}\", \"ref\": \"${{ github.ref }}\", \"validate\": true}" \
              "https://api.github.com/repos/${{ github.repository }}/code-scanning/sarifs" || true
          fi
