name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  idevops-security:
    name: iDevOps Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run iDevOps Security
        uses: TAI-opensource/idevops/actions/idevops@main
        with:
          languages: "auto"
          security: "true"
          sast: "true"
          sca: "true"
          secrets: "true"
          lint: "false"
          quality: "false"
          dependencies: "true"
          check-outdated: "true"
          fail-on: "high"
          upload-sarif: "true"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        shell: bash
        run: |
          if [ -f results.sarif ]; then
            curl -s -X POST \
              -H "Authorization: token ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              -d "{\"sarif\": $(cat results.sarif), \"commit_sha\": \"${{ github.sha }}\", \"ref\": \"${{ github.ref }}\", \"validate\": true}" \
              "https://api.github.com/repos/${{ github.repository }}/code-scanning/sarifs" || true
          fi
