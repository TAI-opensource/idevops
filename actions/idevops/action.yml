name: "iDevOps All-in-One DevOps Pipeline"
description: "The MOST comprehensive GitHub Action for DevOps - security scanning, SAST, SCA, secret detection, linting, IaC scanning, container security, DAST, dependency management, license compliance, SBOM generation, and more."
author: "iDevOps"
branding:
  icon: "shield"
  color: "blue"

inputs:
  token:
    description: "GitHub token for authentication and Security tab uploads"
    required: false
    default: ${{ github.token }}

  languages:
    description: "Comma-separated list of languages to lint and analyze. Auto-detects if not specified."
    required: false
    default: "auto-detect"

  security:
    description: "Run universal security scans"
    required: false
    default: "true"

  sast:
    description: "Run Static Application Security Testing (SAST)"
    required: false
    default: "true"

  sca:
    description: "Run Software Composition Analysis (SCA)"
    required: false
    default: "true"

  secrets:
    description: "Scan for hardcoded secrets and credentials"
    required: false
    default: "true"

  lint:
    description: "Run language-specific linters"
    required: false
    default: "true"

  lint-fix:
    description: "Auto-fix linting issues when possible"
    required: false
    default: "false"

  quality:
    description: "Run code quality checks (complexity, duplication, metrics)"
    required: false
    default: "true"

  dependencies:
    description: "Check dependencies for vulnerabilities and policy violations"
    required: false
    default: "true"

  check-outdated:
    description: "Check for outdated dependencies"
    required: false
    default: "true"

  check-licenses:
    description: "Check license compliance for all dependencies"
    required: false
    default: "false"

  allowed-licenses:
    description: "Comma-separated list of allowed licenses"
    required: false
    default: "MIT,Apache-2.0,ISC,BSD-2-Clause,BSD-3-Clause,0BSD"

  denied-licenses:
    description: "Comma-separated list of denied licenses"
    required: false
    default: "GPL-3.0,AGPL-3.0,SSPL-1.0,BSL-1.1"

  docker:
    description: "Lint Dockerfiles. Auto-detects Dockerfiles if not specified."
    required: false
    default: "auto-detect"

  container-image:
    description: "Container image name to scan for vulnerabilities"
    required: false
    default: ""

  iac:
    description: "Scan Infrastructure as Code files. Auto-detects IaC files if not specified."
    required: false
    default: "auto-detect"

  iac-types:
    description: "Comma-separated IaC types: terraform,cloudformation,kubernetes,helm,docker,ansible,pulumi,bicep,arm"
    required: false
    default: "auto-detect"

  dast:
    description: "Run Dynamic Application Security Testing (DAST)"
    required: false
    default: "false"

  target-url:
    description: "Target URL for DAST scanning"
    required: false
    default: ""

  recon:
    description: "Run security reconnaissance scans"
    required: false
    default: "false"

  sbom:
    description: "Generate Software Bill of Materials (SBOM)"
    required: false
    default: "false"

  sbom-format:
    description: "SBOM format: cyclonedx, spdx, or both"
    required: false
    default: "both"

  fail-on:
    description: "Fail the workflow at this vulnerability threshold: critical, high, medium, low, never"
    required: false
    default: "high"

  upload-sarif:
    description: "Upload SARIF files to GitHub Security tab"
    required: false
    default: "true"

  cache:
    description: "Cache tool installations for faster subsequent runs"
    required: false
    default: "true"

  report-dir:
    description: "Directory for storing reports and artifacts"
    required: false
    default: ".idevops/reports"

  parallel:
    description: "Run independent checks in parallel when possible"
    required: false
    default: "true"

outputs:
  summary:
    description: "Markdown summary of all checks performed"
    value: ${{ steps.generate-summary.outputs.summary }}

  score:
    description: "Overall project health score (0-100)"
    value: ${{ steps.generate-summary.outputs.score }}

  sarif-files:
    description: "Comma-separated list of generated SARIF files"
    value: ${{ steps.generate-sarif.outputs.sarif-files }}

  sbom-files:
    description: "Comma-separated list of generated SBOM files"
    value: ${{ steps.generate-sbom.outputs.sbom-files }}

  vulnerabilities-count:
    description: "Total number of vulnerabilities found"
    value: ${{ steps.generate-summary.outputs.vulnerabilities-count }}

  issues-count:
    description: "Total number of linting issues found"
    value: ${{ steps.generate-summary.outputs.issues-count }}

  outdated-count:
    description: "Total number of outdated dependencies"
    value: ${{ steps.generate-summary.outputs.outdated-count }}

  licenses-issues:
    description: "Number of license compliance issues"
    value: ${{ steps.generate-summary.outputs.licenses-issues }}

runs:
  using: "composite"
  steps:
    # ============================================================
    # STEP 1: Validate Inputs
    # ============================================================
    - name: "Validate inputs"
      id: validate-inputs
      shell: bash
      run: |
        echo "::group::Validating inputs"

        # Validate fail-on threshold
        VALID_THRESHOLDS="critical high medium low never"
        if [[ ! " $VALID_THRESHOLDS " =~ " ${{ inputs.fail-on }} " ]]; then
          echo "::error::Invalid fail-on value: ${{ inputs.fail-on }}. Must be one of: $VALID_THRESHOLDS"
          exit 1
        fi

        # Validate sbom-format
        VALID_SBOM_FORMATS="cyclonedx spdx both"
        if [[ ! " $VALID_SBOM_FORMATS " =~ " ${{ inputs.sbom-format }} " ]]; then
          echo "::error::Invalid sbom-format value: ${{ inputs.sbom-format }}. Must be one of: $VALID_SBOM_FORMATS"
          exit 1
        fi

        # Validate boolean inputs
        for INPUT_NAME in security sast sca secrets lint lint-fix quality dependencies check-outdated \
                          check-licenses docker iac dast recon sbom upload-sarif cache parallel; do
          INPUT_VALUE="${!INPUT_NAME}"
          if [[ "$INPUT_VALUE" != "true" && "$INPUT_VALUE" != "false" && "$INPUT_VALUE" != "auto-detect" ]]; then
            echo "::error::Invalid value for $INPUT_NAME: $INPUT_VALUE. Must be 'true', 'false', or 'auto-detect'."
            exit 1
          fi
        done

        # Validate iac-types
        if [[ "${{ inputs.iac-types }}" != "auto-detect" ]]; then
          IFS=',' read -ra IAC_ARRAY <<< "${{ inputs.iac-types }}"
          VALID_IAC="terraform cloudformation kubernetes helm docker ansible pulumi bicep arm"
          for iac_type in "${IAC_ARRAY[@]}"; do
            iac_type=$(echo "$iac_type" | xargs)  # trim whitespace
            if [[ ! " $VALID_IAC " =~ " $iac_type " ]]; then
              echo "::error::Invalid IaC type: $iac_type. Must be one of: $VALID_IAC"
              exit 1
            fi
          done
        fi

        # Validate DAST requires target-url
        if [[ "${{ inputs.dast }}" == "true" && -z "${{ inputs.target-url }}" ]]; then
          echo "::error::DAST scanning requires target-url input"
          exit 1
        fi

        echo "All inputs validated successfully"
        echo "::endgroup::"

    # ============================================================
    # STEP 2: Setup Tools
    # ============================================================
    - name: "Setup tools and directories"
      id: setup-tools
      shell: bash
      run: |
        echo "::group::Setting up tools and directories"

        # Create report directory
        REPORT_DIR="${{ inputs.report-dir }}"
        mkdir -p "$REPORT_DIR/security"
        mkdir -p "$REPORT_DIR/sast"
        mkdir -p "$REPORT_DIR/sca"
        mkdir -p "$REPORT_DIR/secrets"
        mkdir -p "$REPORT_DIR/lint"
        mkdir -p "$REPORT_DIR/quality"
        mkdir -p "$REPORT_DIR/dependencies"
        mkdir -p "$REPORT_DIR/iac"
        mkdir -p "$REPORT_DIR/container"
        mkdir -p "$REPORT_DIR/dast"
        mkdir -p "$REPORT_DIR/recon"
        mkdir -p "$REPORT_DIR/licenses"
        mkdir -p "$REPORT_DIR/sbom"
        mkdir -p "$REPORT_DIR/sarif"
        mkdir -p "$REPORT_DIR/summary"

        # Set environment variables for subsequent steps
        echo "REPORT_DIR=$REPORT_DIR" >> "$GITHUB_ENV"
        echo "IDEVOPS_VERSION=1.0.0" >> "$GITHUB_ENV"
        echo "RUN_ID=${{ github.run_id }}" >> "$GITHUB_ENV"
        echo "RUN_ATTEMPT=${{ github.run_attempt }}" >> "$GITHUB_ENV"
        echo "REPO=${{ github.repository }}" >> "$GITHUB_ENV"
        echo "REF=${{ github.ref }}" >> "$GITHUB_ENV"
        echo "SHA=${{ github.sha }}" >> "$GITHUB_ENV"
        echo "WORKSPACE=${{ github.workspace }}" >> "$GITHUB_ENV"

        # Initialize counters
        echo "VULNERABILITIES_COUNT=0" >> "$GITHUB_ENV"
        echo "ISSUES_COUNT=0" >> "$GITHUB_ENV"
        echo "OUTDATED_COUNT=0" >> "$GITHUB_ENV"
        echo "LICENSES_ISSUES=0" >> "$GITHUB_ENV"

        # Initialize SARIF and SBOM file lists
        echo "SARIF_FILES=" >> "$GITHUB_ENV"
        echo "SBOM_FILES=" >> "$GITHUB_ENV"

        # Initialize score tracking
        echo "SECURITY_SCORE=100" >> "$GITHUB_ENV"
        echo "QUALITY_SCORE=100" >> "$GITHUB_ENV"
        echo "DEPENDENCY_SCORE=100" >> "$GITHUB_ENV"

        # Setup PATH for tools
        export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$HOME/go/bin:$PATH"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
        echo "$HOME/go/bin" >> "$GITHUB_PATH"

        # Cache setup
        if [[ "${{ inputs.cache }}" == "true" ]]; then
          CACHE_DIR="$HOME/.idevops-cache"
          mkdir -p "$CACHE_DIR"
          echo "CACHE_DIR=$CACHE_DIR" >> "$GITHUB_ENV"
          echo "Cache directory: $CACHE_DIR"
        fi

        echo "Setup completed successfully"
        echo "::endgroup::"

    # ============================================================
    # STEP 3: Security Scans (Universal)
    # ============================================================
    - name: "Security scans"
      id: security-scans
      if: inputs.security == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Running universal security scans"

        REPORT_FILE="$REPORT_DIR/security/security-scan.json"
        SARIF_FILE="$REPORT_DIR/sarif/security.sarif"

        # Run basic security checks
        bash "${{ github.action_path }}/scripts/security-scan.sh" \
          --workspace "${{ github.workspace }}" \
          --output "$REPORT_FILE" \
          --sarif "$SARIF_FILE" \
          2>&1 | tee "$REPORT_DIR/security/security-scan.log" || true

        # Count vulnerabilities from report
        if [[ -f "$REPORT_FILE" ]]; then
          VULN_COUNT=$(jq -r '.vulnerabilities | length // 0' "$REPORT_FILE" 2>/dev/null || echo "0")
          echo "VULNERABILITIES_COUNT=$((VULNERABILITIES_COUNT + VULN_COUNT))" >> "$GITHUB_ENV"
          echo "Found $VULN_COUNT vulnerabilities"

          # Update security score based on findings
          if [[ $VULN_COUNT -gt 0 ]]; then
            CRITICAL=$(jq -r '.vulnerabilities | map(select(.severity == "critical")) | length // 0' "$REPORT_FILE" 2>/dev/null || echo "0")
            HIGH=$(jq -r '.vulnerabilities | map(select(.severity == "high")) | length // 0' "$REPORT_FILE" 2>/dev/null || echo "0")
            MEDIUM=$(jq -r '.vulnerabilities | map(select(.severity == "medium")) | length // 0' "$REPORT_FILE" 2>/dev/null || echo "0")
            LOW=$(jq -r '.vulnerabilities | map(select(.severity == "low")) | length // 0' "$REPORT_FILE" 2>/dev/null || echo "0")

            # Deduct points: critical=25, high=15, medium=5, low=1
            DEDUCTION=$((CRITICAL * 25 + HIGH * 15 + MEDIUM * 5 + LOW * 1))
            NEW_SCORE=$((SECURITY_SCORE - DEDUCTION))
            if [[ $NEW_SCORE -lt 0 ]]; then NEW_SCORE=0; fi
            echo "SECURITY_SCORE=$NEW_SCORE" >> "$GITHUB_ENV"
          fi
        fi

        # Track SARIF file
        if [[ -f "$SARIF_FILE" ]]; then
          if [[ -z "$SARIF_FILES" ]]; then
            echo "SARIF_FILES=$SARIF_FILE" >> "$GITHUB_ENV"
          else
            echo "SARIF_FILES=$SARIF_FILES,$SARIF_FILE" >> "$GITHUB_ENV"
          fi
        fi

        echo "Security scans completed"
        echo "::endgroup::"

    # ============================================================
    # STEP 4: SAST Scans
    # ============================================================
    - name: "SAST scans"
      id: sast-scans
      if: inputs.sast == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Running SAST scans"

        SARIF_FILE="$REPORT_DIR/sarif/sast.sarif"

        bash "${{ github.action_path }}/scripts/sast-scan.sh" \
          --workspace "${{ github.workspace }}" \
          --output "$REPORT_DIR/sast" \
          --sarif "$SARIF_FILE" \
          --languages "${{ inputs.languages }}" \
          2>&1 | tee "$REPORT_DIR/sast/sast-scan.log" || true

        # Track SARIF file
        if [[ -f "$SARIF_FILE" ]]; then
          if [[ -z "$SARIF_FILES" ]]; then
            echo "SARIF_FILES=$SARIF_FILE" >> "$GITHUB_ENV"
          else
            echo "SARIF_FILES=$SARIF_FILES,$SARIF_FILE" >> "$GITHUB_ENV"
          fi
        fi

        # Update vulnerability count from SAST findings
        if [[ -f "$REPORT_DIR/sast/sast-results.json" ]]; then
          SAST_VULNS=$(jq -r '.findings | length // 0' "$REPORT_DIR/sast/sast-results.json" 2>/dev/null || echo "0")
          echo "VULNERABILITIES_COUNT=$((VULNERABILITIES_COUNT + SAST_VULNS))" >> "$GITHUB_ENV"

          if [[ $SAST_VULNS -gt 0 ]]; then
            CRITICAL=$(jq -r '.findings | map(select(.severity == "critical")) | length // 0' "$REPORT_DIR/sast/sast-results.json" 2>/dev/null || echo "0")
            HIGH=$(jq -r '.findings | map(select(.severity == "high")) | length // 0' "$REPORT_DIR/sast/sast-results.json" 2>/dev/null || echo "0")
            DEDUCTION=$((CRITICAL * 20 + HIGH * 10))
            NEW_SCORE=$((SECURITY_SCORE - DEDUCTION))
            if [[ $NEW_SCORE -lt 0 ]]; then NEW_SCORE=0; fi
            echo "SECURITY_SCORE=$NEW_SCORE" >> "$GITHUB_ENV"
          fi
        fi

        echo "SAST scans completed"
        echo "::endgroup::"

    # ============================================================
    # STEP 5: SCA Scans
    # ============================================================
    - name: "SCA scans"
      id: sca-scans
      if: inputs.sca == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Running Software Composition Analysis"

        SARIF_FILE="$REPORT_DIR/sarif/sca.sarif"

        bash "${{ github.action_path }}/scripts/sca-scan.sh" \
          --workspace "${{ github.workspace }}" \
          --output "$REPORT_DIR/sca" \
          --sarif "$SARIF_FILE" \
          2>&1 | tee "$REPORT_DIR/sca/sca-scan.log" || true

        # Track SARIF file
        if [[ -f "$SARIF_FILE" ]]; then
          if [[ -z "$SARIF_FILES" ]]; then
            echo "SARIF_FILES=$SARIF_FILE" >> "$GITHUB_ENV"
          else
            echo "SARIF_FILES=$SARIF_FILES,$SARIF_FILE" >> "$GITHUB_ENV"
          fi
        fi

        # Update vulnerability count from SCA findings
        if [[ -f "$REPORT_DIR/sca/sca-results.json" ]]; then
          SCA_VULNS=$(jq -r '.vulnerabilities | length // 0' "$REPORT_DIR/sca/sca-results.json" 2>/dev/null || echo "0")
          echo "VULNERABILITIES_COUNT=$((VULNERABILITIES_COUNT + SCA_VULNS))" >> "$GITHUB_ENV"

          if [[ $SCA_VULNS -gt 0 ]]; then
            CRITICAL=$(jq -r '.vulnerabilities | map(select(.severity == "critical")) | length // 0' "$REPORT_DIR/sca/sca-results.json" 2>/dev/null || echo "0")
            HIGH=$(jq -r '.vulnerabilities | map(select(.severity == "high")) | length // 0' "$REPORT_DIR/sca/sca-results.json" 2>/dev/null || echo "0")
            DEDUCTION=$((CRITICAL * 15 + HIGH * 8))
            NEW_SCORE=$((SECURITY_SCORE - DEDUCTION))
            if [[ $NEW_SCORE -lt 0 ]]; then NEW_SCORE=0; fi
            echo "SECURITY_SCORE=$NEW_SCORE" >> "$GITHUB_ENV"
          fi
        fi

        echo "SCA scans completed"
        echo "::endgroup::"

    # ============================================================
    # STEP 6: Secret Detection
    # ============================================================
    - name: "Secret detection"
      id: secret-detection
      if: inputs.secrets == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Running secret detection"

        SARIF_FILE="$REPORT_DIR/sarif/secrets.sarif"

        bash "${{ github.action_path }}/scripts/secret-scan.sh" \
          --workspace "${{ github.workspace }}" \
          --output "$REPORT_DIR/secrets" \
          --sarif "$SARIF_FILE" \
          2>&1 | tee "$REPORT_DIR/secrets/secret-scan.log" || true

        # Track SARIF file
        if [[ -f "$SARIF_FILE" ]]; then
          if [[ -z "$SARIF_FILES" ]]; then
            echo "SARIF_FILES=$SARIF_FILE" >> "$GITHUB_ENV"
          else
            echo "SARIF_FILES=$SARIF_FILES,$SARIF_FILE" >> "$GITHUB_ENV"
          fi
        fi

        # Update vulnerability count from secrets
        if [[ -f "$REPORT_DIR/secrets/secrets-results.json" ]]; then
          SECRET_COUNT=$(jq -r '.secrets | length // 0' "$REPORT_DIR/secrets/secrets-results.json" 2>/dev/null || echo "0")
          echo "VULNERABILITIES_COUNT=$((VULNERABILITIES_COUNT + SECRET_COUNT))" >> "$GITHUB_ENV"

          if [[ $SECRET_COUNT -gt 0 ]]; then
            CRITICAL=$(jq -r '.secrets | map(select(.severity == "critical")) | length // 0' "$REPORT_DIR/secrets/secrets-results.json" 2>/dev/null || echo "0")
            HIGH=$(jq -r '.secrets | map(select(.severity == "high")) | length // 0' "$REPORT_DIR/secrets/secrets-results.json" 2>/dev/null || echo "0")
            DEDUCTION=$((CRITICAL * 30 + HIGH * 20))
            NEW_SCORE=$((SECURITY_SCORE - DEDUCTION))
            if [[ $NEW_SCORE -lt 0 ]]; then NEW_SCORE=0; fi
            echo "SECURITY_SCORE=$NEW_SCORE" >> "$GITHUB_ENV"
          fi
        fi

        echo "Secret detection completed"
        echo "::endgroup::"

    # ============================================================
    # STEP 7: Per-Language Linting
    # ============================================================
    - name: "Detect languages"
      id: detect-languages
      if: inputs.lint == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Detecting project languages"

        DETECTED_LANGUAGES=""

        if [[ "${{ inputs.languages }}" == "auto-detect" ]]; then
          # Auto-detect languages based on file extensions and config files
          WORKSPACE="${{ github.workspace }}"

          # JavaScript/TypeScript
          if ls "$WORKSPACE"/*.js "$WORKSPACE"/*.ts "$WORKSPACE"/*.jsx "$WORKSPACE"/*.tsx 2>/dev/null | head -1 > /dev/null 2>&1; then
            if [[ -f "$WORKSPACE/package.json" ]]; then
              DETECTED_LANGUAGES="$DETECTED_LANGUAGES,javascript"
            fi
          fi

          if ls "$WORKSPACE"/*.ts "$WORKSPACE"/*.tsx 2>/dev/null | head -1 > /dev/null 2>&1; then
            if [[ -f "$WORKSPACE/tsconfig.json" ]]; then
              DETECTED_LANGUAGES="$DETECTED_LANGUAGES,typescript"
            fi
          fi

          # Python
          if ls "$WORKSPACE"/*.py 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,python"
          fi

          # Rust
          if [[ -f "$WORKSPACE/Cargo.toml" ]]; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,rust"
          fi

          # Go
          if [[ -f "$WORKSPACE/go.mod" ]] || ls "$WORKSPACE"/*.go 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,go"
          fi

          # Java
          if [[ -f "$WORKSPACE/pom.xml" ]] || [[ -f "$WORKSPACE/build.gradle" ]] || [[ -f "$WORKSPACE/build.gradle.kts" ]]; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,java"
          fi

          # Kotlin
          if ls "$WORKSPACE"/*.kt 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,kotlin"
          fi

          # C#
          if ls "$WORKSPACE"/*.cs "$WORKSPACE"/*.csproj 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,csharp"
          fi

          # C/C++
          if ls "$WORKSPACE"/*.c "$WORKSPACE"/*.h 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,c"
          fi
          if ls "$WORKSPACE"/*.cpp "$WORKSPACE"/*.hpp "$WORKSPACE"/*.cc "$WORKSPACE"/*.cxx 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,cpp"
          fi

          # Ruby
          if [[ -f "$WORKSPACE/Gemfile" ]] || ls "$WORKSPACE"/*.rb 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,ruby"
          fi

          # PHP
          if [[ -f "$WORKSPACE/composer.json" ]] || ls "$WORKSPACE"/*.php 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,php"
          fi

          # Swift
          if [[ -f "$WORKSPACE/Package.swift" ]] || ls "$WORKSPACE"/*.swift 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,swift"
          fi

          # Scala
          if ls "$WORKSPACE"/*.scala 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,scala"
          fi

          # Haskell
          if ls "$WORKSPACE"/*.hs 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,haskell"
          fi

          # Elixir
          if [[ -f "$WORKSPACE/mix.exs" ]]; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,elixir"
          fi

          # Dart
          if [[ -f "$WORKSPACE/pubspec.yaml" ]] || ls "$WORKSPACE"/*.dart 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,dart"
          fi

          # Shell
          if ls "$WORKSPACE"/*.sh "$WORKSPACE"/*.bash 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,shell"
          fi

          # Lua
          if ls "$WORKSPACE"/*.lua 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,lua"
          fi

          # Perl
          if ls "$WORKSPACE"/*.pl "$WORKSPACE"/*.pm 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,perl"
          fi

          # R
          if ls "$WORKSPACE"/*.R "$WORKSPACE"/*.r 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,r"
          fi

          # Julia
          if ls "$WORKSPACE"/*.jl 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,julia"
          fi

          # PowerShell
          if ls "$WORKSPACE"/*.ps1 "$WORKSPACE"/*.psm1 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,powershell"
          fi

          # SQL
          if ls "$WORKSPACE"/*.sql 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,sql"
          fi

          # GraphQL
          if ls "$WORKSPACE"/*.graphql "$WORKSPACE"/*.gql 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,graphql"
          fi

          # Protobuf
          if ls "$WORKSPACE"/*.proto 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_LANGUAGES="$DETECTED_LANGUAGES,protobuf"
          fi

          # CSS
          if ls "$WORKSPACE"/*.css "$WORKSPACE"/*.scss "$WORKSPACE"/*.less 2>/dev/null | head -1 > /dev/null 2>&1; then
