name: "iDevOps"
description: "All-in-one DevOps pipeline — Security, Quality, Linting, Dependencies, Secrets, Docker & more. Free & Open-Source."
author: "TAI-opensource"
branding:
  icon: "shield"
  color: "blue"

inputs:
  token:
    description: "GitHub token for API access"
    default: "${{ github.token }}"
  languages:
    description: "Comma-separated languages: javascript,typescript,python,rust,go,docker"
    default: "javascript,typescript"
  security:
    description: "Run security scans (Trivy, osv-scanner, Semgrep)"
    default: "true"
  codeql:
    description: "Run CodeQL analysis"
    default: "true"
  secrets:
    description: "Scan for leaked secrets (Gitleaks, TruffleHog)"
    default: "true"
  lint:
    description: "Run language linters (ESLint, Ruff, Clippy, Hadolint)"
    default: "true"
  quality:
    description: "Run code quality checks (complexity, duplication, metrics)"
    default: "true"
  dependencies:
    description: "Check for outdated/vulnerable dependencies"
    default: "true"
  docker:
    description: "Lint Dockerfiles with Hadolint"
    default: "false"
  fail-on:
    description: "Fail workflow on: critical, high, medium, low, never"
    default: "high"
  fix:
    description: "Auto-fix issues when possible"
    default: "false"
  upload-sarif:
    description: "Upload SARIF results to GitHub Security tab"
    default: "true"
  cache:
    description: "Cache tool installations"
    default: "true"

outputs:
  summary:
    description: "Markdown summary of all checks"
    value: "${{ steps.summary.outputs.report }}"
  score:
    description: "Overall project health score (0-100)"
    value: "${{ steps.summary.outputs.score }}"
  sarif-files:
    description: "Comma-separated list of generated SARIF files"
    value: "${{ steps.sarif.outputs.files }}"

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      shell: bash
      run: |
        echo "iDevOps -- All-in-One DevOps Pipeline"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "Languages:    ${{ inputs.languages }}"
        echo "Security:     ${{ inputs.security }}"
        echo "CodeQL:       ${{ inputs.codeql }}"
        echo "Secrets:      ${{ inputs.secrets }}"
        echo "Lint:         ${{ inputs.lint }}"
        echo "Quality:      ${{ inputs.quality }}"
        echo "Dependencies: ${{ inputs.dependencies }}"
        echo "Docker:       ${{ inputs.docker }}"
        echo "Fail-on:      ${{ inputs.fail-on }}"
        echo "Auto-fix:     ${{ inputs.fix }}"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

    - name: Setup tools
      shell: bash
      run: |
        chmod +x ${{ github.action_path }}/scripts/*.sh 2>/dev/null || true

    # ─────────────────────────────────────────────
    # SECURITY SCANS
    # ─────────────────────────────────────────────
    - name: "Security: Trivy filesystem scan"
      if: inputs.security == 'true'
      shell: bash
      run: ${{ github.action_path }}/scripts/security-trivy.sh
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        GITHUB_TOKEN: ${{ inputs.token }}

    - name: "Security: OSV-Scanner"
      if: inputs.security == 'true'
      shell: bash
      run: ${{ github.action_path }}/scripts/security-osv.sh
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "Security: Semgrep SAST"
      if: inputs.security == 'true'
      shell: bash
      run: ${{ github.action_path }}/scripts/security-semgrep.sh
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        LANGUAGES: ${{ inputs.languages }}
        SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

    # ─────────────────────────────────────────────
    # CODEQL
    # ─────────────────────────────────────────────
    - name: "CodeQL: Initialize"
      if: inputs.codeql == 'true'
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ inputs.languages == 'javascript' && 'javascript' || inputs.languages == 'typescript' && 'javascript' || inputs.languages }}
        queries: security-and-quality
        use-languages: true
      continue-on-error: true

    - name: "CodeQL: Autobuild"
      if: inputs.codeql == 'true'
      uses: github/codeql-action/autobuild@v3
      continue-on-error: true

    - name: "CodeQL: Analyze"
      if: inputs.codeql == 'true'
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{ inputs.languages }}"
      continue-on-error: true

    # ─────────────────────────────────────────────
    # SECRET DETECTION
    # ─────────────────────────────────────────────
    - name: "Secrets: Gitleaks"
      if: inputs.secrets == 'true'
      shell: bash
      run: ${{ github.action_path }}/scripts/secrets-gitleaks.sh
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        GITHUB_TOKEN: ${{ inputs.token }}

    - name: "Secrets: TruffleHog"
      if: inputs.secrets == 'true'
      shell: bash
      run: ${{ github.action_path }}/scripts/secrets-trufflehog.sh
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    # ─────────────────────────────────────────────
    # LINTING
    # ─────────────────────────────────────────────
    - name: "Lint: ESLint / Biome"
      if: inputs.lint == 'true' && contains(inputs.languages, 'javascript')
      shell: bash
      run: ${{ github.action_path }}/scripts/lint-js.sh
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        FIX: ${{ inputs.fix }}

    - name: "Lint: Ruff (Python)"
      if: inputs.lint == 'true' && contains(inputs.languages, 'python')
      shell: bash
      run: ${{ github.action_path }}/scripts/lint-python.sh
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        FIX: ${{ inputs.fix }}

    - name: "Lint: Clippy (Rust)"
      if: inputs.lint == 'true' && contains(inputs.languages, 'rust')
      shell: bash
      run: ${{ github.action_path }}/scripts/lint-rust.sh
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "Lint: Hadolint (Docker)"
      if: inputs.docker == 'true' || (inputs.lint == 'true' && contains(inputs.languages, 'docker'))
      shell: bash
      run: ${{ github.action_path }}/scripts/lint-docker.sh
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "Lint: Go Vet / staticcheck"
      if: inputs.lint == 'true' && contains(inputs.languages, 'go')
      shell: bash
      run: ${{ github.action_path }}/scripts/lint-go.sh
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    # ─────────────────────────────────────────────
    # DEPENDENCY CHECKS
    # ─────────────────────────────────────────────
    - name: "Dependencies: Audit & Outdated"
      if: inputs.dependencies == 'true'
      shell: bash
      run: ${{ github.action_path }}/scripts/deps-audit.sh
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        LANGUAGES: ${{ inputs.languages }}

    # ─────────────────────────────────────────────
    # CODE QUALITY
    # ─────────────────────────────────────────────
    - name: "Quality: Metrics & Complexity"
      if: inputs.quality == 'true'
      shell: bash
      run: ${{ github.action_path }}/scripts/quality.sh
      env:
        LANGUAGES: ${{ inputs.languages }}

    # ─────────────────────────────────────────────
    # SUMMARY
    # ─────────────────────────────────────────────
    - name: "Generate Report"
      if: always()
      id: summary
      shell: bash
      run: ${{ github.action_path }}/scripts/summary.sh
      env:
        GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
