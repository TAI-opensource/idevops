name: "iDevOps"
description: "All-in-one DevOps pipeline - Security, Linting, Dependencies, Secrets, IaC, Container, DAST, SBOM. 34+ languages. 67 scripts. Free & Open-Source."
author: "TAI-opensource"
branding:
  icon: "shield"
  color: "blue"

inputs:
  token:
    description: "GitHub token"
    default: "${{ github.token }}"
  languages:
    description: "Comma-separated: javascript,typescript,python,rust,go,java,kotlin,csharp,c,cpp,ruby,php,swift,scala,haskell,elixir,dart,shell,lua,perl,r,julia,powershell,sql,graphql,protobuf,css,html,yaml,json,markdown,terraform,cloudformation,kubernetes,helm,docker,ansible"
    default: "auto"
  security:
    description: "Run security scans"
    default: "true"
  sast:
    description: "Run SAST scans"
    default: "true"
  sca:
    description: "Run SCA scans"
    default: "true"
  scan-secrets:
    description: "Scan for secrets"
    default: "true"
  lint:
    description: "Run linters"
    default: "true"
  lint-fix:
    description: "Auto-fix linting issues"
    default: "false"
  quality:
    description: "Run code quality checks"
    default: "true"
  dependencies:
    description: "Check dependencies"
    default: "true"
  check-outdated:
    description: "Check for outdated deps"
    default: "true"
  check-licenses:
    description: "Check license compliance"
    default: "false"
  docker:
    description: "Lint Dockerfiles"
    default: "auto"
  container-image:
    description: "Container image to scan"
    default: ""
  iac:
    description: "Scan IaC files"
    default: "auto"
  iac-types:
    description: "IaC types: terraform,cloudformation,kubernetes,helm,docker,ansible"
    default: "auto"
  dast:
    description: "Run DAST scanning"
    default: "false"
  target-url:
    description: "Target URL for DAST"
    default: ""
  recon:
    description: "Run security recon"
    default: "false"
  sbom:
    description: "Generate SBOM"
    default: "false"
  sbom-format:
    description: "SBOM format: cyclonedx, spdx, both"
    default: "both"
  fail-on:
    description: "Fail threshold: critical, high, medium, low, never"
    default: "high"
  upload-sarif:
    description: "Upload SARIF to Security tab"
    default: "true"
  report-dir:
    description: "Reports directory"
    default: ".idevops/reports"
  semgrep-app-token:
    description: "Semgrep App token for custom rules (pass via env: SEMGREP_APP_TOKEN)"
    default: ""

outputs:
  summary:
    description: "Markdown summary"
    value: "${{ steps.summary.outputs.report }}"
  score:
    description: "Health score (0-100)"
    value: "${{ steps.summary.outputs.score }}"
  sarif-files:
    description: "SARIF files"
    value: "${{ steps.sarif.outputs.files }}"

runs:
  using: "composite"
  steps:
    # ══════════════════════════════════════════════════════════════
    # PHASE 1 - SETUP
    # ══════════════════════════════════════════════════════════════
    - name: "iDevOps: Setup"
      shell: bash
      run: |
        echo "::group::iDevOps Configuration"
        echo "╔══════════════════════════════════════════════════╗"
        echo "║           iDevOps - DevSecOps Pipeline           ║"
        echo "╠══════════════════════════════════════════════════╣"
        echo "║  Languages:    ${{ inputs.languages }}"
        echo "║  Security:     ${{ inputs.security }}"
        echo "║  SAST:         ${{ inputs.sast }}"
        echo "║  SCA:          ${{ inputs.sca }}"
        echo "║  Secrets:      ${{ inputs.scan-secrets }}"
        echo "║  Lint:         ${{ inputs.lint }}"
        echo "║  Quality:      ${{ inputs.quality }}"
        echo "║  Dependencies: ${{ inputs.dependencies }}"
        echo "║  Docker:       ${{ inputs.docker }}"
        echo "║  IaC:          ${{ inputs.iac }}"
        echo "║  DAST:         ${{ inputs.dast }}"
        echo "║  Recon:        ${{ inputs.recon }}"
        echo "║  SBOM:         ${{ inputs.sbom }}"
        echo "║  Fail-on:      ${{ inputs.fail-on }}"
        echo "╚══════════════════════════════════════════════════╝"
        echo "::endgroup::"

        chmod +x ${{ github.action_path }}/scripts/*.sh 2>/dev/null || true
        mkdir -p "${{ inputs.report-dir }}"

    # ══════════════════════════════════════════════════════════════
    # PHASE 2 - SECURITY
    # ══════════════════════════════════════════════════════════════
    - name: "iDevOps: Security Scan (Universal)"
      if: inputs.security == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Security Universal Scan"
        ${{ github.action_path }}/scripts/security-universal.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        LANGUAGES: ${{ inputs.languages }}
        GITHUB_TOKEN: ${{ inputs.token }}

    - name: "iDevOps: Security Scan (Trivy)"
      if: inputs.security == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Security Trivy Scan"
        ${{ github.action_path }}/scripts/security-trivy.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: SAST (OSV-Scanner)"
      if: inputs.sca == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::SAST OSV-Scanner"
        ${{ github.action_path }}/scripts/security-osv.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: SAST (Semgrep)"
      if: inputs.sast == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::SAST Semgrep"
        ${{ github.action_path }}/scripts/security-semgrep.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        LANGUAGES: ${{ inputs.languages }}
        SEMGREP_APP_TOKEN: ${{ inputs.semgrep-app-token }}

    # ══════════════════════════════════════════════════════════════
    # PHASE 3 - SECRETS
    # ══════════════════════════════════════════════════════════════
    - name: "iDevOps: Secret Detection (Gitleaks)"
      if: inputs.scan-secrets == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Secret Detection Gitleaks"
        ${{ github.action_path }}/scripts/secrets-gitleaks.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        GITHUB_TOKEN: ${{ inputs.token }}

    - name: "iDevOps: Secret Detection (TruffleHog)"
      if: inputs.scan-secrets == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Secret Detection TruffleHog"
        ${{ github.action_path }}/scripts/secrets-trufflehog.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    # ══════════════════════════════════════════════════════════════
    # PHASE 4 - LINTING
    # ══════════════════════════════════════════════════════════════
    - name: "iDevOps: Lint JavaScript/TypeScript"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'javascript') || contains(inputs.languages, 'typescript') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint JavaScript/TypeScript"
        ${{ github.action_path }}/scripts/lint-javascript.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        FIX: ${{ inputs.lint-fix }}

    - name: "iDevOps: Lint Python"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'python') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Python"
        ${{ github.action_path }}/scripts/lint-python.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        FIX: ${{ inputs.lint-fix }}

    - name: "iDevOps: Lint Rust"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'rust') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Rust"
        ${{ github.action_path }}/scripts/lint-rust.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Go"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'go') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Go"
        ${{ github.action_path }}/scripts/lint-go.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Java/Kotlin"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'java') || contains(inputs.languages, 'kotlin') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Java/Kotlin"
        ${{ github.action_path }}/scripts/lint-java.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint C/C++"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'c') || contains(inputs.languages, 'cpp') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint C/C++"
        ${{ github.action_path }}/scripts/lint-c-cpp.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint C#"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'csharp') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint C#"
        ${{ github.action_path }}/scripts/lint-csharp.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Ruby"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'ruby') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Ruby"
        ${{ github.action_path }}/scripts/lint-ruby.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint PHP"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'php') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint PHP"
        ${{ github.action_path }}/scripts/lint-php.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Swift"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'swift') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Swift"
        ${{ github.action_path }}/scripts/lint-swift.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Scala"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'scala') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Scala"
        ${{ github.action_path }}/scripts/lint-scala.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Haskell"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'haskell') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Haskell"
        ${{ github.action_path }}/scripts/lint-haskell.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Elixir"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'elixir') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Elixir"
        ${{ github.action_path }}/scripts/lint-elixir.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Dart"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'dart') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Dart"
        ${{ github.action_path }}/scripts/lint-dart.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Shell"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'shell') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Shell"
        ${{ github.action_path }}/scripts/lint-shell.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Lua"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'lua') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Lua"
        ${{ github.action_path }}/scripts/lint-lua.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Perl"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'perl') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Perl"
        ${{ github.action_path }}/scripts/lint-perl.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint R"
      if: inputs.lint == 'true' && inputs.languages != 'auto'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint R"
        LANGS="${{ inputs.languages }}"
        if echo ",$LANGS," | grep -q ",r,"; then
          ${{ github.action_path }}/scripts/lint-r.sh
        else
          echo "R not in specified languages, skipping"
        fi
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint R (auto)"
      if: inputs.lint == 'true' && inputs.languages == 'auto'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint R"
        ${{ github.action_path }}/scripts/lint-r.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Julia"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'julia') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Julia"
        ${{ github.action_path }}/scripts/lint-julia.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint PowerShell"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'powershell') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint PowerShell"
        ${{ github.action_path }}/scripts/lint-powershell.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint SQL"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'sql') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint SQL"
        ${{ github.action_path }}/scripts/lint-sql.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint GraphQL"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'graphql') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint GraphQL"
        ${{ github.action_path }}/scripts/lint-graphql.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Protobuf"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'protobuf') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Protobuf"
        ${{ github.action_path }}/scripts/lint-protobuf.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint CSS"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'css') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint CSS"
        ${{ github.action_path }}/scripts/lint-css.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint HTML"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'html') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint HTML"
        ${{ github.action_path }}/scripts/lint-html.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint YAML"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'yaml') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint YAML"
        ${{ github.action_path }}/scripts/lint-yaml.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint JSON"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'json') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint JSON"
        ${{ github.action_path }}/scripts/lint-json.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Markdown"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'markdown') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Markdown"
        ${{ github.action_path }}/scripts/lint-markdown.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Docker"
      if: inputs.docker == 'true' || inputs.docker == 'auto' || (inputs.lint == 'true' && contains(inputs.languages, 'docker'))
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Docker"
        ${{ github.action_path }}/scripts/lint-docker.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Terraform"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'terraform') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Terraform"
        ${{ github.action_path }}/scripts/lint-terraform.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Kubernetes"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'kubernetes') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Kubernetes"
        ${{ github.action_path }}/scripts/lint-kubernetes.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Helm"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'helm') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Helm"
        ${{ github.action_path }}/scripts/lint-helm.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Lint Ansible"
      if: inputs.lint == 'true' && (contains(inputs.languages, 'ansible') || inputs.languages == 'auto')
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Lint Ansible"
        ${{ github.action_path }}/scripts/lint-ansible.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}

    # ══════════════════════════════════════════════════════════════
    # PHASE 5 - IaC
    # ══════════════════════════════════════════════════════════════
    - name: "iDevOps: IaC Scan"
      if: inputs.iac == 'true' || inputs.iac == 'auto'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::IaC Scan"
        ${{ github.action_path }}/scripts/iac-scanner.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        IAC_TYPES: ${{ inputs.iac-types }}

    # ══════════════════════════════════════════════════════════════
    # PHASE 6 - CONTAINER
    # ══════════════════════════════════════════════════════════════
    - name: "iDevOps: Container Security"
      if: inputs.docker == 'true' || inputs.docker == 'auto' || inputs.container-image != ''
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Container Security"
        ${{ github.action_path }}/scripts/container-scanner.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        CONTAINER_IMAGE: ${{ inputs.container-image }}

    # ══════════════════════════════════════════════════════════════
    # PHASE 7 - DAST
    # ══════════════════════════════════════════════════════════════
    - name: "iDevOps: DAST Scan"
      if: inputs.dast == 'true' && inputs.target-url != ''
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::DAST Scan"
        ${{ github.action_path }}/scripts/dast-scanner.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        TARGET_URL: ${{ inputs.target-url }}

    # ══════════════════════════════════════════════════════════════
    # PHASE 8 - RECON
    # ══════════════════════════════════════════════════════════════
    - name: "iDevOps: Recon Scan"
      if: inputs.recon == 'true' && inputs.target-url != ''
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Recon Scan"
        ${{ github.action_path }}/scripts/recon-scanner.sh
        echo "::endgroup::"
      env:
        TARGET_URL: ${{ inputs.target-url }}

    # ══════════════════════════════════════════════════════════════
    # PHASE 9 - DEPENDENCIES
    # ══════════════════════════════════════════════════════════════
    - name: "iDevOps: Dependencies Audit"
      if: inputs.dependencies == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Dependencies Audit"
        ${{ github.action_path }}/scripts/deps-universal.sh
        echo "::endgroup::"
      env:
        FAIL_ON: ${{ inputs.fail-on }}
        LANGUAGES: ${{ inputs.languages }}

    - name: "iDevOps: Dependencies Outdated"
      if: inputs.check-outdated == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Dependencies Outdated"
        ${{ github.action_path }}/scripts/outdated-checker.sh
        echo "::endgroup::"
      env:
        LANGUAGES: ${{ inputs.languages }}

    - name: "iDevOps: License Compliance"
      if: inputs.check-licenses == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::License Compliance"
        ${{ github.action_path }}/scripts/license-scanner.sh
        echo "::endgroup::"
      env:
        LANGUAGES: ${{ inputs.languages }}

    # ══════════════════════════════════════════════════════════════
    # PHASE 10 - QUALITY
    # ══════════════════════════════════════════════════════════════
    - name: "iDevOps: Code Quality"
      if: inputs.quality == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Code Quality"
        ${{ github.action_path }}/scripts/quality.sh
        echo "::endgroup::"
      env:
        LANGUAGES: ${{ inputs.languages }}

    # ══════════════════════════════════════════════════════════════
    # PHASE 11 - SBOM
    # ══════════════════════════════════════════════════════════════
    - name: "iDevOps: SBOM Generation"
      if: inputs.sbom == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::SBOM Generation"
        ${{ github.action_path }}/scripts/sbom-generator.sh
        echo "::endgroup::"
      env:
        SBOM_FORMAT: ${{ inputs.sbom-format }}

    # ══════════════════════════════════════════════════════════════
    # PHASE 12 - REPORTING
    # ══════════════════════════════════════════════════════════════
    - name: "iDevOps: Generate Report"
      id: summary
      if: always()
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Generate Report"
        ${{ github.action_path }}/scripts/summary.sh
        echo "::endgroup::"
      env:
        GITHUB_STEP_SUMMARY: ${{ env.GITHUB_STEP_SUMMARY }}
        FAIL_ON: ${{ inputs.fail-on }}

    - name: "iDevOps: Upload SARIF"
      id: sarif
      if: inputs.upload-sarif == 'true' && always()
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Upload SARIF"
        ${{ github.action_path }}/scripts/sarif-upload.sh
        echo "::endgroup::"
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        REPORT_DIR: ${{ inputs.report-dir }}
