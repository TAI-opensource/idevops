    # ============================================================
    # STEP 8: IaC Scanning
    # ============================================================
    - name: "Detect IaC files"
      id: detect-iac
      if: inputs.iac == 'true' || inputs.iac == 'auto-detect'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Detecting IaC files"

        DETECTED_IAC_TYPES=""

        if [[ "${{ inputs.iac-types }}" == "auto-detect" ]]; then
          WORKSPACE="${{ github.workspace }}"

          # Terraform
          if ls "$WORKSPACE"/*.tf "$WORKSPACE"/**/*.tf 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_IAC_TYPES="$DETECTED_IAC_TYPES,terraform"
          fi

          # CloudFormation
          if ls "$WORKSPACE"/*.yaml "$WORKSPACE"/*.yml "$WORKSPACE"/*.json 2>/dev/null | xargs grep -l "AWSTemplateFormatVersion" 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_IAC_TYPES="$DETECTED_IAC_TYPES,cloudformation"
          fi

          # Kubernetes
          if ls "$WORKSPACE"/*.yaml "$WORKSPACE"/*.yml 2>/dev/null | xargs grep -l "apiVersion:" 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_IAC_TYPES="$DETECTED_IAC_TYPES,kubernetes"
          fi

          # Helm
          if [[ -f "$WORKSPACE/Chart.yaml" ]] || ls "$WORKSPACE"/**/Chart.yaml 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_IAC_TYPES="$DETECTED_IAC_TYPES,helm"
          fi

          # Ansible
          if [[ -f "$WORKSPACE/playbook.yml" ]] || ls "$WORKSPACE"/playbooks/*.yml 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_IAC_TYPES="$DETECTED_IAC_TYPES,ansible"
          fi

          # Pulumi
          if ls "$WORKSPACE"/Pulumi.yaml 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_IAC_TYPES="$DETECTED_IAC_TYPES,pulumi"
          fi

          # Bicep
          if ls "$WORKSPACE"/*.bicep 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_IAC_TYPES="$DETECTED_IAC_TYPES,bicep"
          fi

          # ARM templates
          if ls "$WORKSPACE"/*.json 2>/dev/null | xargs grep -l "\$schema.*deploymentTemplate" 2>/dev/null | head -1 > /dev/null 2>&1; then
            DETECTED_IAC_TYPES="$DETECTED_IAC_TYPES,arm"
          fi

          # Remove leading comma
          DETECTED_IAC_TYPES="${DETECTED_IAC_TYPES#,}"
        else
          DETECTED_IAC_TYPES="${{ inputs.iac-types }}"
        fi

        if [[ -z "$DETECTED_IAC_TYPES" ]]; then
          echo "No IaC files detected"
          echo "IAC_ENABLED=false" >> "$GITHUB_ENV"
        else
          echo "Detected IaC types: $DETECTED_IAC_TYPES"
          echo "DETECTED_IAC_TYPES=$DETECTED_IAC_TYPES" >> "$GITHUB_ENV"
          echo "IAC_ENABLED=true" >> "$GITHUB_ENV"
        fi

        echo "::endgroup::"

    - name: "Scan Infrastructure as Code"
      id: iac-scan
      if: (inputs.iac == 'true' || inputs.iac == 'auto-detect') && env.IAC_ENABLED == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Scanning Infrastructure as Code"

        SARIF_FILE="$REPORT_DIR/sarif/iac.sarif"

        bash "${{ github.action_path }}/scripts/iac-scan.sh" \
          --workspace "${{ github.workspace }}" \
          --output "$REPORT_DIR/iac" \
          --sarif "$SARIF_FILE" \
          --iac-types "${{ env.DETECTED_IAC_TYPES }}" \
          2>&1 | tee "$REPORT_DIR/iac/iac-scan.log" || true

        # Track SARIF file
        if [[ -f "$SARIF_FILE" ]]; then
          if [[ -z "$SARIF_FILES" ]]; then
            echo "SARIF_FILES=$SARIF_FILE" >> "$GITHUB_ENV"
          else
            echo "SARIF_FILES=$SARIF_FILES,$SARIF_FILE" >> "$GITHUB_ENV"
          fi
        fi

        # Update vulnerability count
        if [[ -f "$REPORT_DIR/iac/iac-results.json" ]]; then
          IAC_VULNS=$(jq -r '.issues | length // 0' "$REPORT_DIR/iac/iac-results.json" 2>/dev/null || echo "0")
          echo "VULNERABILITIES_COUNT=$((VULNERABILITIES_COUNT + IAC_VULNS))" >> "$GITHUB_ENV"

          if [[ $IAC_VULNS -gt 0 ]]; then
            CRITICAL=$(jq -r '.issues | map(select(.severity == "critical")) | length // 0' "$REPORT_DIR/iac/iac-results.json" 2>/dev/null || echo "0")
            HIGH=$(jq -r '.issues | map(select(.severity == "high")) | length // 0' "$REPORT_DIR/iac/iac-results.json" 2>/dev/null || echo "0")
            DEDUCTION=$((CRITICAL * 15 + HIGH * 8))
            NEW_SCORE=$((SECURITY_SCORE - DEDUCTION))
            if [[ $NEW_SCORE -lt 0 ]]; then NEW_SCORE=0; fi
            echo "SECURITY_SCORE=$NEW_SCORE" >> "$GITHUB_ENV"
          fi
        fi

        echo "IaC scanning completed"
        echo "::endgroup::"

    # ============================================================
    # STEP 9: Container Security
    # ============================================================
    - name: "Scan Dockerfiles"
      id: docker-lint
      if: inputs.docker == 'true' || inputs.docker == 'auto-detect'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Scanning Dockerfiles"

        # Auto-detect Dockerfiles if needed
        if [[ "${{ inputs.docker }}" == "auto-detect" ]]; then
          WORKSPACE="${{ github.workspace }}"
          if ! ls "$WORKSPACE"/Dockerfile "$WORKSPACE"/docker-compose.yml "$WORKSPACE"/docker-compose.yaml 2>/dev/null | head -1 > /dev/null 2>&1; then
            if ! ls "$WORKSPACE"/*/Dockerfile "$WORKSPACE"/**/Dockerfile 2>/dev/null | head -1 > /dev/null 2>&1; then
              echo "No Dockerfiles detected, skipping"
              echo "::endgroup::"
              exit 0
            fi
          fi
        fi

        SARIF_FILE="$REPORT_DIR/sarif/docker.sarif"

        bash "${{ github.action_path }}/scripts/docker-lint.sh" \
          --workspace "${{ github.workspace }}" \
          --output "$REPORT_DIR/container" \
          --sarif "$SARIF_FILE" \
          2>&1 | tee "$REPORT_DIR/container/docker-lint.log" || true

        # Track SARIF file
        if [[ -f "$SARIF_FILE" ]]; then
          if [[ -z "$SARIF_FILES" ]]; then
            echo "SARIF_FILES=$SARIF_FILE" >> "$GITHUB_ENV"
          else
            echo "SARIF_FILES=$SARIF_FILES,$SARIF_FILE" >> "$GITHUB_ENV"
          fi
        fi

        echo "Dockerfile scanning completed"
        echo "::endgroup::"

    - name: "Scan container image"
      id: container-scan
      if: inputs.container-image != ''
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Scanning container image: ${{ inputs.container-image }}"

        SARIF_FILE="$REPORT_DIR/sarif/container.sarif"

        bash "${{ github.action_path }}/scripts/container-scan.sh" \
          --image "${{ inputs.container-image }}" \
          --output "$REPORT_DIR/container" \
          --sarif "$SARIF_FILE" \
          2>&1 | tee "$REPORT_DIR/container/container-scan.log" || true

        # Track SARIF file
        if [[ -f "$SARIF_FILE" ]]; then
          if [[ -z "$SARIF_FILES" ]]; then
            echo "SARIF_FILES=$SARIF_FILE" >> "$GITHUB_ENV"
          else
            echo "SARIF_FILES=$SARIF_FILES,$SARIF_FILE" >> "$GITHUB_ENV"
          fi
        fi

        # Update vulnerability count
        if [[ -f "$REPORT_DIR/container/container-results.json" ]]; then
          CONTAINER_VULNS=$(jq -r '.vulnerabilities | length // 0' "$REPORT_DIR/container/container-results.json" 2>/dev/null || echo "0")
          echo "VULNERABILITIES_COUNT=$((VULNERABILITIES_COUNT + CONTAINER_VULNS))" >> "$GITHUB_ENV"

          if [[ $CONTAINER_VULNS -gt 0 ]]; then
            CRITICAL=$(jq -r '.vulnerabilities | map(select(.severity == "critical")) | length // 0' "$REPORT_DIR/container/container-results.json" 2>/dev/null || echo "0")
            HIGH=$(jq -r '.vulnerabilities | map(select(.severity == "high")) | length // 0' "$REPORT_DIR/container/container-results.json" 2>/dev/null || echo "0")
            DEDUCTION=$((CRITICAL * 20 + HIGH * 10))
            NEW_SCORE=$((SECURITY_SCORE - DEDUCTION))
            if [[ $NEW_SCORE -lt 0 ]]; then NEW_SCORE=0; fi
            echo "SECURITY_SCORE=$NEW_SCORE" >> "$GITHUB_ENV"
          fi
        fi

        echo "Container image scanning completed"
        echo "::endgroup::"

    # ============================================================
    # STEP 10: DAST Scanning
    # ============================================================
    - name: "DAST scanning"
      id: dast-scan
      if: inputs.dast == 'true' && inputs.target-url != ''
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Running DAST scanning on ${{ inputs.target-url }}"

        SARIF_FILE="$REPORT_DIR/sarif/dast.sarif"

        bash "${{ github.action_path }}/scripts/dast-scan.sh" \
          --target-url "${{ inputs.target-url }}" \
          --output "$REPORT_DIR/dast" \
          --sarif "$SARIF_FILE" \
          2>&1 | tee "$REPORT_DIR/dast/dast-scan.log" || true

        # Track SARIF file
        if [[ -f "$SARIF_FILE" ]]; then
          if [[ -z "$SARIF_FILES" ]]; then
            echo "SARIF_FILES=$SARIF_FILE" >> "$GITHUB_ENV"
          else
            echo "SARIF_FILES=$SARIF_FILES,$SARIF_FILE" >> "$GITHUB_ENV"
          fi
        fi

        # Update vulnerability count
        if [[ -f "$REPORT_DIR/dast/dast-results.json" ]]; then
          DAST_VULNS=$(jq -r '.vulnerabilities | length // 0' "$REPORT_DIR/dast/dast-results.json" 2>/dev/null || echo "0")
          echo "VULNERABILITIES_COUNT=$((VULNERABILITIES_COUNT + DAST_VULNS))" >> "$GITHUB_ENV"

          if [[ $DAST_VULNS -gt 0 ]]; then
            CRITICAL=$(jq -r '.vulnerabilities | map(select(.severity == "critical")) | length // 0' "$REPORT_DIR/dast/dast-results.json" 2>/dev/null || echo "0")
            HIGH=$(jq -r '.vulnerabilities | map(select(.severity == "high")) | length // 0' "$REPORT_DIR/dast/dast-results.json" 2>/dev/null || echo "0")
            DEDUCTION=$((CRITICAL * 20 + HIGH * 10))
            NEW_SCORE=$((SECURITY_SCORE - DEDUCTION))
            if [[ $NEW_SCORE -lt 0 ]]; then NEW_SCORE=0; fi
            echo "SECURITY_SCORE=$NEW_SCORE" >> "$GITHUB_ENV"
          fi
        fi

        echo "DAST scanning completed"
        echo "::endgroup::"

    # ============================================================
    # STEP 11: Recon Scanning
    # ============================================================
    - name: "Security reconnaissance"
      id: recon-scan
      if: inputs.recon == 'true' && inputs.target-url != ''
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Running security reconnaissance on ${{ inputs.target-url }}"

        bash "${{ github.action_path }}/scripts/recon-scan.sh" \
          --target-url "${{ inputs.target-url }}" \
          --output "$REPORT_DIR/recon" \
          2>&1 | tee "$REPORT_DIR/recon/recon-scan.log" || true

        # Recon doesn't produce SARIF but may identify additional attack surface

        echo "Security reconnaissance completed"
        echo "::endgroup::"

    # ============================================================
    # STEP 12: Dependency Checks (Universal)
    # ============================================================
    - name: "Dependency vulnerability checks"
      id: dependency-checks
      if: inputs.dependencies == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Running dependency vulnerability checks"

        SARIF_FILE="$REPORT_DIR/sarif/dependencies.sarif"

        bash "${{ github.action_path }}/scripts/dependency-check.sh" \
          --workspace "${{ github.workspace }}" \
          --output "$REPORT_DIR/dependencies" \
          --sarif "$SARIF_FILE" \
          2>&1 | tee "$REPORT_DIR/dependencies/dependency-check.log" || true

        # Track SARIF file
        if [[ -f "$SARIF_FILE" ]]; then
          if [[ -z "$SARIF_FILES" ]]; then
            echo "SARIF_FILES=$SARIF_FILE" >> "$GITHUB_ENV"
          else
            echo "SARIF_FILES=$SARIF_FILES,$SARIF_FILE" >> "$GITHUB_ENV"
          fi
        fi

        # Update vulnerability count
        if [[ -f "$REPORT_DIR/dependencies/dependency-results.json" ]]; then
          DEP_VULNS=$(jq -r '.vulnerabilities | length // 0' "$REPORT_DIR/dependencies/dependency-results.json" 2>/dev/null || echo "0")
          echo "VULNERABILITIES_COUNT=$((VULNERABILITIES_COUNT + DEP_VULNS))" >> "$GITHUB_ENV"

          if [[ $DEP_VULNS -gt 0 ]]; then
            CRITICAL=$(jq -r '.vulnerabilities | map(select(.severity == "critical")) | length // 0' "$REPORT_DIR/dependencies/dependency-results.json" 2>/dev/null || echo "0")
            HIGH=$(jq -r '.vulnerabilities | map(select(.severity == "high")) | length // 0' "$REPORT_DIR/dependencies/dependency-results.json" 2>/dev/null || echo "0")
            DEDUCTION=$((CRITICAL * 15 + HIGH * 8))
            NEW_SCORE=$((DEPENDENCY_SCORE - DEDUCTION))
            if [[ $NEW_SCORE -lt 0 ]]; then NEW_SCORE=0; fi
            echo "DEPENDENCY_SCORE=$NEW_SCORE" >> "$GITHUB_ENV"
          fi
        fi

        echo "Dependency checks completed"
        echo "::endgroup::"

    # ============================================================
    # STEP 13: Outdated Dependency Check
    # ============================================================
    - name: "Check outdated dependencies"
      id: outdated-check
      if: inputs.check-outdated == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Checking for outdated dependencies"

        bash "${{ github.action_path }}/scripts/outdated-check.sh" \
          --workspace "${{ github.workspace }}" \
          --output "$REPORT_DIR/dependencies" \
          2>&1 | tee "$REPORT_DIR/dependencies/outdated-check.log" || true

        # Update outdated count
        if [[ -f "$REPORT_DIR/dependencies/outdated-results.json" ]]; then
          OUTDATED_COUNT=$(jq -r '.outdated | length // 0' "$REPORT_DIR/dependencies/outdated-results.json" 2>/dev/null || echo "0")
          echo "OUTDATED_COUNT=$OUTDATED_COUNT" >> "$GITHUB_ENV"

          if [[ $OUTDATED_COUNT -gt 0 ]]; then
            MAJOR=$(jq -r '.outdated | map(select(.updateType == "major")) | length // 0' "$REPORT_DIR/dependencies/outdated-results.json" 2>/dev/null || echo "0")
            DEDUCTION=$((MAJOR * 5 + OUTDATED_COUNT * 1))
            NEW_SCORE=$((DEPENDENCY_SCORE - DEDUCTION))
            if [[ $NEW_SCORE -lt 0 ]]; then NEW_SCORE=0; fi
            echo "DEPENDENCY_SCORE=$NEW_SCORE" >> "$GITHUB_ENV"
          fi
        fi

        echo "Outdated dependency check completed"
        echo "::endgroup::"

    # ============================================================
    # STEP 14: License Compliance Check
    # ============================================================
    - name: "License compliance check"
      id: license-check
      if: inputs.check-licenses == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Checking license compliance"

        ALLOWED_LICENSES="${{ inputs.allowed-licenses }}"
        DENIED_LICENSES="${{ inputs.denied-licenses }}"

        bash "${{ github.action_path }}/scripts/license-check.sh" \
          --workspace "${{ github.workspace }}" \
          --output "$REPORT_DIR/licenses" \
          --allowed "$ALLOWED_LICENSES" \
          --denied "$DENIED_LICENSES" \
          2>&1 | tee "$REPORT_DIR/licenses/license-check.log" || true

        # Update license issues count
        if [[ -f "$REPORT_DIR/licenses/license-results.json" ]]; then
          LICENSE_ISSUES=$(jq -r '.issues | length // 0' "$REPORT_DIR/licenses/license-results.json" 2>/dev/null || echo "0")
          echo "LICENSES_ISSUES=$LICENSE_ISSUES" >> "$GITHUB_ENV"

          if [[ $LICENSE_ISSUES -gt 0 ]]; then
            DEDUCTION=$((LICENSE_ISSUES * 5))
            NEW_SCORE=$((DEPENDENCY_SCORE - DEDUCTION))
            if [[ $NEW_SCORE -lt 0 ]]; then NEW_SCORE=0; fi
            echo "DEPENDENCY_SCORE=$NEW_SCORE" >> "$GITHUB_ENV"
          fi
        fi

        echo "License compliance check completed"
        echo "::endgroup::"

    # ============================================================
    # STEP 15: Code Quality Metrics
    # ============================================================
    - name: "Code quality metrics"
      id: code-quality
      if: inputs.quality == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Running code quality analysis"

        bash "${{ github.action_path }}/scripts/quality-check.sh" \
          --workspace "${{ github.workspace }}" \
          --output "$REPORT_DIR/quality" \
          2>&1 | tee "$REPORT_DIR/quality/quality-check.log" || true

        # Update quality score based on metrics
        if [[ -f "$REPORT_DIR/quality/quality-results.json" ]]; then
          COMPLEXITY=$(jq -r '.metrics.complexity // 0' "$REPORT_DIR/quality/quality-results.json" 2>/dev/null || echo "0")
          DUPLICATION=$(jq -r '.metrics.duplication // 0' "$REPORT_DIR/quality/quality-results.json" 2>/dev/null || echo "0")
          MAINTAINABILITY=$(jq -r '.metrics.maintainability // 100' "$REPORT_DIR/quality/quality-results.json" 2>/dev/null || echo "100")

          # Deduct points for high complexity and duplication
          if [[ $COMPLEXITY -gt 20 ]]; then
            DEDUCTION=$((COMPLEXITY - 20))
            NEW_SCORE=$((QUALITY_SCORE - DEDUCTION))
            if [[ $NEW_SCORE -lt 0 ]]; then NEW_SCORE=0; fi
            echo "QUALITY_SCORE=$NEW_SCORE" >> "$GITHUB_ENV"
          fi

          if [[ $DUPLICATION -gt 10 ]]; then
            DEDUCTION=$((DUPLICATION - 10))
            NEW_SCORE=$((QUALITY_SCORE - DEDUCTION))
            if [[ $NEW_SCORE -lt 0 ]]; then NEW_SCORE=0; fi
            echo "QUALITY_SCORE=$NEW_SCORE" >> "$GITHUB_ENV"
          fi
        fi

        echo "Code quality analysis completed"
        echo "::endgroup::"

    # ============================================================
    # STEP 16: SBOM Generation
    # ============================================================
    - name: "Generate SBOM"
      id: generate-sbom
      if: inputs.sbom == 'true'
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Generating Software Bill of Materials"

        SBOM_FORMAT="${{ inputs.sbom-format }}"
        SBOM_DIR="$REPORT_DIR/sbom"
        GENERATED_SBOMS=""

        # Generate CycloneDX SBOM
        if [[ "$SBOM_FORMAT" == "cyclonedx" || "$SBOM_FORMAT" == "both" ]]; then
          bash "${{ github.action_path }}/scripts/generate-sbom.sh" \
            --workspace "${{ github.workspace }}" \
            --output "$SBOM_DIR" \
            --format cyclonedx \
            2>&1 | tee "$SBOM_DIR/sbom-cyclonedx.log" || true

          if [[ -f "$SBOM_DIR/sbom-cyclonedx.json" ]]; then
            GENERATED_SBOMS="$SBOM_DIR/sbom-cyclonedx.json"
          fi
          if [[ -f "$SBOM_DIR/sbom-cyclonedx.xml" ]]; then
            GENERATED_SBOMS="$GENERATED_SBOMS,$SBOM_DIR/sbom-cyclonedx.xml"
          fi
        fi

        # Generate SPDX SBOM
        if [[ "$SBOM_FORMAT" == "spdx" || "$SBOM_FORMAT" == "both" ]]; then
          bash "${{ github.action_path }}/scripts/generate-sbom.sh" \
            --workspace "${{ github.workspace }}" \
            --output "$SBOM_DIR" \
            --format spdx \
            2>&1 | tee "$SBOM_DIR/sbom-spdx.log" || true

          if [[ -f "$SBOM_DIR/sbom-spdx.json" ]]; then
            GENERATED_SBOMS="$GENERATED_SBOMS,$SBOM_DIR/sbom-spdx.json"
          fi
          if [[ -f "$SBOM_DIR/sbom-spdx.rdf" ]]; then
            GENERATED_SBOMS="$GENERATED_SBOMS,$SBOM_DIR/sbom-spdx.rdf"
          fi
        fi

        # Remove leading comma
        GENERATED_SBOMS="${GENERATED_SBOMS#,}"
        echo "SBOM_FILES=$GENERATED_SBOMS" >> "$GITHUB_ENV"

        echo "Generated SBOMs: $GENERATED_SBOMS"
        echo "SBOM generation completed"
        echo "::endgroup::"

    # ============================================================
    # STEP 17: Generate SARIF Uploads
    # ============================================================
    - name: "Generate SARIF uploads"
      id: generate-sarif
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Generating SARIF upload configuration"

        SARIF_DIR="$REPORT_DIR/sarif"
        MERGED_SARIF="$SARIF_DIR/merged.sarif"
        ALL_SARIF_FILES=""

        # Find all generated SARIF files
        if ls "$SARIF_DIR"/*.sarif 1> /dev/null 2>&1; then
          for sarif_file in "$SARIF_DIR"/*.sarif; do
            if [[ -f "$sarif_file" ]] && [[ "$sarif_file" != "$MERGED_SARIF" ]]; then
              if [[ -z "$ALL_SARIF_FILES" ]]; then
                ALL_SARIF_FILES="$sarif_file"
              else
                ALL_SARIF_FILES="$ALL_SARIF_FILES,$sarif_file"
              fi
            fi
          done
        fi

        # Use the SARIF_FILES from environment (set by individual steps)
        if [[ -n "$SARIF_FILES" ]]; then
          ALL_SARIF_FILES="$SARIF_FILES"
        fi

        echo "SARIF_FILES=$ALL_SARIF_FILES" >> "$GITHUB_ENV"
        echo "sarif-files=$ALL_SARIF_FILES" >> "$GITHUB_OUTPUT"

        # Create merged SARIF for upload
        if [[ -n "$ALL_SARIF_FILES" ]]; then
          bash "${{ github.action_path }}/scripts/merge-sarif.sh" \
            --input "$ALL_SARIF_FILES" \
            --output "$MERGED_SARIF" \
            2>&1 || true
        fi

        echo "SARIF files: $ALL_SARIF_FILES"
        echo "SARIF generation completed"
        echo "::endgroup::"

    # ============================================================
    # STEP 18: Generate Summary Report
    # ============================================================
    - name: "Generate summary report"
      id: generate-summary
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Generating summary report"

        # Calculate overall score
        TOTAL_SCORE=$(( (SECURITY_SCORE + QUALITY_SCORE + DEPENDENCY_SCORE) / 3 ))
        if [[ $TOTAL_SCORE -gt 100 ]]; then TOTAL_SCORE=100; fi
        if [[ $TOTAL_SCORE -lt 0 ]]; then TOTAL_SCORE=0; fi

        # Generate markdown summary
        SUMMARY_FILE="$REPORT_DIR/summary/report.md"
        bash "${{ github.action_path }}/scripts/generate-summary.sh" \
          --workspace "${{ github.workspace }}" \
          --output "$SUMMARY_FILE" \
          --vulnerabilities "$VULNERABILITIES_COUNT" \
          --issues "$ISSUES_COUNT" \
          --outdated "$OUTDATED_COUNT" \
          --licenses "$LICENSES_ISSUES" \
          --security-score "$SECURITY_SCORE" \
          --quality-score "$QUALITY_SCORE" \
          --dependency-score "$DEPENDENCY_SCORE" \
          --total-score "$TOTAL_SCORE" \
          --sarif-files "${{ env.SARIF_FILES }}" \
          --sbom-files "${{ env.SBOM_FILES }}" \
          --report-dir "$REPORT_DIR" \
          2>&1 | tee "$REPORT_DIR/summary/generate-summary.log" || true

        # Set outputs
        if [[ -f "$SUMMARY_FILE" ]]; then
          SUMMARY_CONTENT=$(cat "$SUMMARY_FILE")
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY_CONTENT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        else
          echo "summary=iDevOps scan completed" >> "$GITHUB_OUTPUT"
        fi

        echo "score=$TOTAL_SCORE" >> "$GITHUB_OUTPUT"
        echo "vulnerabilities-count=$VULNERABILITIES_COUNT" >> "$GITHUB_OUTPUT"
        echo "issues-count=$ISSUES_COUNT" >> "$GITHUB_OUTPUT"
        echo "outdated-count=$OUTDATED_COUNT" >> "$GITHUB_OUTPUT"
        echo "licenses-issues=$LICENSES_ISSUES" >> "$GITHUB_OUTPUT"

        # Write summary to GitHub Actions step summary
        if [[ -f "$SUMMARY_FILE" ]]; then
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
        fi

        echo "Overall score: $TOTAL_SCORE/100"
        echo "Summary report generated"
        echo "::endgroup::"

    # ============================================================
    # STEP 19: Upload SARIF to GitHub Security Tab
    # ============================================================
    - name: "Upload SARIF to GitHub Security tab"
      id: upload-sarif
      if: inputs.upload-sarif == 'true' && env.SARIF_FILES != ''
      shell: bash
      continue-on-error: true
      run: |
        echo "::group::Uploading SARIF to GitHub Security tab"

        SARIF_DIR="$REPORT_DIR/sarif"
        MERGED_SARIF="$SARIF_DIR/merged.sarif"

        if [[ -f "$MERGED_SARIF" ]]; then
          # Use GitHub CLI to upload SARIF
          if command -v gh &> /dev/null; then
            gh code-scanning upload \
              --file "$MERGED_SARIF" \
              --repo "${{ github.repository }}" \
              --commit-ref "${{ github.ref }}" \
              --comment "iDevOps scan results (run #${{ github.run_number }})" \
            2>&1 | tee "$REPORT_DIR/sarif/upload.log" || true
          else
            echo "GitHub CLI not available, using upload-sarif action"
          fi
        else
          echo "No merged SARIF file found, uploading individual files"
          if ls "$SARIF_DIR"/*.sarif 1> /dev/null 2>&1; then
            for sarif_file in "$SARIF_DIR"/*.sarif; do
              if [[ -f "$sarif_file" ]]; then
                echo "Would upload: $sarif_file"
              fi
            done
          fi
        fi

        echo "SARIF upload completed"
        echo "::endgroup::"

    # ============================================================
    # STEP 20: Final Threshold Check
    # ============================================================
    - name: "Check failure threshold"
      id: threshold-check
      shell: bash
      run: |
        echo "::group::Checking failure threshold"

        FAIL_ON="${{ inputs.fail-on }}"
        SHOULD_FAIL=false

        case "$FAIL_ON" in
          critical)
            if [[ $VULNERABILITIES_COUNT -gt 0 ]]; then
              # Check if any critical vulnerabilities exist
              CRITICAL_COUNT=0
              if ls "$REPORT_DIR"/**/*.json 1> /dev/null 2>&1; then
                for json_file in "$REPORT_DIR"/**/*.json; do
                  if [[ -f "$json_file" ]]; then
                    COUNT=$(jq -r '[.vulnerabilities[]?, .findings[]?, .issues[]?, .secrets[]?] | map(select(.severity == "critical")) | length' "$json_file" 2>/dev/null || echo "0")
                    CRITICAL_COUNT=$((CRITICAL_COUNT + COUNT))
                  fi
                done
              fi
              if [[ $CRITICAL_COUNT -gt 0 ]]; then
                SHOULD_FAIL=true
                echo "::error::Critical vulnerabilities found: $CRITICAL_COUNT"
              fi
            fi
            ;;
          high)
            if [[ $VULNERABILITIES_COUNT -gt 0 ]]; then
              SHOULD_FAIL=true
              echo "::error::Vulnerabilities found (threshold: high): $VULNERABILITIES_COUNT"
            fi
            ;;
          medium)
            if [[ $VULNERABILITIES_COUNT -gt 0 ]] || [[ $ISSUES_COUNT -gt 0 ]]; then
              SHOULD_FAIL=true
              echo "::error::Issues found (threshold: medium): $VULNERABILITIES_COUNT vulnerabilities, $ISSUES_COUNT lint issues"
            fi
            ;;
          low)
            if [[ $VULNERABILITIES_COUNT -gt 0 ]] || [[ $ISSUES_COUNT -gt 0 ]] || [[ $OUTDATED_COUNT -gt 0 ]]; then
              SHOULD_FAIL=true
              echo "::error::Issues found (threshold: low): $VULNERABILITIES_COUNT vulnerabilities, $ISSUES_COUNT lint issues, $OUTDATED_COUNT outdated"
            fi
            ;;
          never)
            echo "Failure threshold set to 'never', workflow will always pass"
            ;;
        esac

        if [[ "$SHOULD_FAIL" == "true" ]]; then
          echo "::error::iDevOps scan failed due to threshold violation (fail-on: $FAIL_ON)"
          exit 1
        fi

        echo "All checks passed within threshold (fail-on: $FAIL_ON)"
        echo "::endgroup::"
